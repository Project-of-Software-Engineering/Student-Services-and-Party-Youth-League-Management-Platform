services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_services}
      POSTGRES_USER: ${POSTGRES_USER:-student_services}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-student_services}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-student_services}:${POSTGRES_PASSWORD:-student_services}@postgres:5432/${POSTGRES_DB:-student_services}?schema=public
      JWT_SECRET: ${JWT_SECRET:-please_change_this_secret}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
